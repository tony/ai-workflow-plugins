# Slop registry — versioned, project-overridable.
#
# This is a v1 byte-for-byte duplicate of:
#   plugins/pr/skills/deslop/references/signatures.yml
#
# The duplication exists because ${CLAUDE_PLUGIN_ROOT} is per-plugin
# and there is no stable cross-plugin file path. Until v1.1 extracts
# the registry to a shared location both /pr:deslop and /slop:scan
# can read, this file MUST be kept in lockstep with the deslop copy.
# When you change one, change the other in the same PR.
#
# ─────────────────────────────────────────────────────────────────
#
# /pr:deslop and /slop:scan slop registry — versioned, project-overridable.
#
# /pr:deslop project overrides live in .claude/deslop.local.yml.
# /slop:scan project overrides live in .claude/slop.local.yml.
# The override file may declare top-level `replace:` / `append:` /
# `delete:` keys (each a list of signature ids). The keys are mutually
# disjoint per id; declaring the same id under more than one key
# refuses with a parser error.
#
# Each signature has the following fields:
#
#   id         — namespaced (e.g. `ai-slop.signatures`)
#   tier       — A | B | C  (governs auto-apply vs suggest vs advisory)
#   confidence — high | medium | low  (orthogonal to tier)
#   action     — remove | rewrite | ask | ignore
#   kind       — regex | semantic
#   target     — list of: diff | message-subject | message-body | file
#   pattern    — regex (required when `kind: regex`); ERE syntax
#   rationale  — one sentence on why this is slop
#   fp-guard   — false-positive context where the rule is suppressed
#   suppress-if — optional additional condition (path / file presence / etc.)

version: 1

signatures:

  # ─── Tier A — auto-apply (deterministic, near-zero FP) ──────────

  - id: ai-slop.signatures
    tier: A
    confidence: high
    action: remove
    kind: regex
    target: [message-body]
    pattern: '(?i)(Generated with .*Claude|Generated with .*Codex|Generated by .*Cursor|🤖|This commit was (auto)?generated)'
    rationale: Trailing AI-tool footers left from copy-paste; never legitimate.
    fp-guard: 'Skip if the project lists AI tools in CONTRIBUTORS or AUTHORS.'

  - id: ai-slop.emoji-in-commit-subject
    tier: A
    confidence: high
    action: remove
    kind: regex
    target: [message-subject]
    pattern: '[\x{1F300}-\x{1FAFF}\x{2600}-\x{27BF}]'
    rationale: Emoji in commit subjects break terminal rendering and `git log` formatting.
    fp-guard: 'Project-overridable for gitmoji users via `.claude/deslop.local.yml`.'

  - id: brittle.commit-message-markdown-leak
    tier: A
    confidence: high
    action: rewrite
    kind: regex
    target: [message-subject]
    pattern: '^\s*(\*\*|#\s|-\s|\[[^\]]+\]\([^)]+\))'
    rationale: Subject opens with markdown syntax, breaks `git log` and terminals.
    fp-guard: 'None — subjects should never start with markdown syntax.'

  - id: low-value.todo-noise
    tier: A
    confidence: high
    action: remove
    kind: regex
    target: [diff]
    pattern: '^\+.*\b(TODO|FIXME|XXX|HACK):?\s*(revisit|later|someday|figure out|come back)\b'
    rationale: Net-new vague TODOs with no owner or ticket reference.
    fp-guard: 'Pattern matches only added lines (`^\+`); pre-existing TODOs untouched.'

  # ─── Tier B — suggest, user-confirmed (~5% FPR) ─────────────────

  - id: brittle.line-numbers
    tier: B
    confidence: high
    action: rewrite
    kind: regex
    target: [diff, message-body]
    pattern: '(?i)\b(see|at|on)\s+line\s+\d{2,4}\b|\bL\d{2,4}\b'
    rationale: Line-number references rot on every refactor.
    fp-guard: 'Skip inside fenced quoted-output blocks (compiler errors, stack traces).'

  - id: brittle.counts
    tier: B
    confidence: high
    action: rewrite
    kind: regex
    target: [message-subject, message-body]
    pattern: '(?i)\b(adds?|removes?|updates?|fixes?)\s+\d+\s+(tests?|files?|lines?|commits?|cases?|callers?|bullets?|items?|sections?)\b'
    rationale: Exact counts duplicate what `git diff --stat` already shows; rot on every revision.
    fp-guard: 'Skip inside `CHANGELOG` / `CHANGES` / release-notes contexts.'

  - id: brittle.sha-in-message
    tier: B
    confidence: medium
    action: rewrite
    kind: regex
    target: [message-body]
    pattern: '\b[0-9a-f]{7,40}\b'
    rationale: Bare SHAs in commit prose age badly; subject lines and bodies should describe behavior, not point at hashes.
    fp-guard: 'Whitelist trailers: `Fixes:`, `Reverts:`, `Co-Authored-By:`, `See-also:`.'

  - id: verbose.restated-subject-in-body
    tier: B
    confidence: medium
    action: rewrite
    kind: semantic
    target: [message-body]
    rationale: The `why:` line paraphrases the subject without adding motivation; body should explain the reason for the change, not repeat the change.
    fp-guard: 'Skip if subject and body have LCS similarity below 0.85.'

  - id: verbose.what-bullets-mirror-diff
    tier: B
    confidence: medium
    action: rewrite
    kind: semantic
    target: [message-body]
    rationale: '`what:` bullets each name a single file or function in the diff, duplicating `git show` output. Bullets should describe the *change*, not list touched symbols.'
    fp-guard: 'Skip if bullets describe behavior (verbs, not file names).'

  - id: low-value.dead-future-code
    tier: B
    confidence: medium
    action: ask
    kind: semantic
    target: [diff]
    rationale: New top-level symbols added with no caller and a comment like "for future use" — should either have a current use or be deleted.
    fp-guard: '`git grep -c <symbol>` returns 1 (only the definition).'

  - id: low-value.formatting-only-commit
    tier: B
    confidence: high
    action: ask
    kind: semantic
    target: [diff]
    rationale: Whole commit is whitespace, import reordering, or formatter output mixed into a feature/fix commit; should be a separate formatting commit or dropped.
    fp-guard: 'Skip if the commit subject is `style:` or `chore(format)` — formatting was the stated intent.'

  - id: low-value.log-debris
    tier: B
    confidence: medium
    action: ask
    kind: regex
    target: [diff]
    pattern: '^\+\s*(console\.(log|debug)|print\(|printf\(|fmt\.Println|System\.out\.println|dbg!|pp\b)'
    rationale: Debug log statements added in non-test files are usually leftovers from active debugging.
    fp-guard: 'Skip in `*-cli.*`, `*main.*`, `scripts/`, and any path containing `debug` — CLI tools and build scripts intentionally write to stdout.'

  - id: ai-slop.co-authored-by-ai
    tier: B
    confidence: medium
    action: remove
    kind: regex
    target: [message-body]
    pattern: '^Co-Authored-By:\s*\S+.*<.*(claude|gpt|codex|copilot|cursor|gemini)\b.*>'
    rationale: AI co-author trailer; user-confirmed because legitimate Co-Authored-By usage exists for human pair-programming.
    fp-guard: 'Demote to advisory if any commit in the last 50 trunk commits used `Co-Authored-By:` legitimately.'

  - id: hardcoded.test-runner
    tier: B
    confidence: medium
    action: rewrite
    kind: regex
    target: [diff, message-body]
    pattern: '(?i)\b(npm|yarn|pnpm)\s+test\b|\bpytest\b|\bcargo\s+test\b|\bgo\s+test\b'
    rationale: Hardcoded test runners in prose where the project may use a different tool or where tooling should be discovered from `AGENTS.md` / `CLAUDE.md`.
    fp-guard: 'Suppress when the matching manifest is present (e.g., `package.json` for `npm test`, `pyproject.toml` for `pytest`).'

  - id: hardcoded.os-paths
    tier: B
    confidence: medium
    action: rewrite
    kind: regex
    target: [diff]
    pattern: '^\+.*(["''])(/Users/|/home/[a-z]+/|C:\\\\Users\\\\)'
    rationale: Absolute user-home paths in committed code break for every other user.
    fp-guard: 'Skip in test fixtures and example documentation.'

  # ─── Tier C — advisory only (high FPR, never auto-applied) ──────

  - id: ai-slop.flagship-phrases
    tier: C
    confidence: low
    action: ignore
    kind: regex
    target: [diff, message-subject, message-body]
    pattern: '(?i)\b(comprehensive solution|robust implementation|best practices|production[- ]ready|enterprise[- ]grade|seamlessly integrat\w+|leverag\w+ the power)\b'
    rationale: Flagship LLM phrasing — almost never appears in human-written code or commit messages, but legitimate occasionally.
    fp-guard: 'Subject to tone calibration: phrases at >= 3 occurrences in last 50 trunk commits are demoted to summary-only.'

  - id: verbose.docstring-exceeds-body
    tier: C
    confidence: low
    action: ask
    kind: semantic
    target: [diff]
    rationale: Docstring or JSDoc comment exceeds the function body in line count, often restating signatures and types already visible.
    fp-guard: 'May be warranted for public API surfaces; never auto-apply.'

  - id: verbose.defensive-wrapping
    tier: C
    confidence: low
    action: ask
    kind: semantic
    target: [diff]
    rationale: New `try`/`except` (or `try`/`catch`) wrapping operations that cannot fail in the current call site.
    fp-guard: 'May be load-bearing — defensive coding around third-party calls is legitimate.'

  - id: structure.multi-topic-commit
    tier: C
    confidence: medium
    action: ask
    kind: semantic
    target: [diff]
    rationale: Commit touches files in three or more unrelated top-level directories with more than 50 added lines and no `why:` body.
    fp-guard: 'Splitting commits is a creative act; advisory only.'

  - id: brittle.dates
    tier: C
    confidence: medium
    action: rewrite
    kind: regex
    target: [diff, message-body]
    pattern: '(?i)\b(as of|current as of|valid through|last updated)\s+(20\d{2}|January|February|March|April|May|June|July|August|September|October|November|December)\b'
    rationale: '"As of <date>" markers rot immediately; reference behavior or version, not calendar time.'
    fp-guard: 'May be intentional in dated documentation; never auto-apply.'

  # ─── Branch-internal narrative bleed ────────────────────────────
  #
  # Within-branch tactical decisions (renames, intermediate states,
  # phantom fixes) leaking from commit messages into the artifacts
  # being committed. Defined in AGENTS.md § Shipped vs. Branch-Internal
  # Narrative; this signature family is the detection layer.

  - id: branch-internal.rename-narrative
    tier: B
    confidence: high
    action: rewrite
    kind: regex
    target: [diff, file]
    pattern: '(?i)\b(renamed?\s+from|was\s+(previously|formerly|originally)\s+(called|named|known\s+as)|used\s+to\s+be\s+(called|named|known\s+as)|formerly\s+(called|named|known\s+as)|originally\s+(named|called)|previously\s+named)\b'
    rationale: |
      In-artifact narration of a within-branch rename. The git diff
      already shows the rename; the editing decision belongs in the
      commit message, not the artifact. Common in test names,
      internal helpers, and docstrings during long-running branches.
    fp-guard: |
      Skip when the named old symbol appears in `git log` before the
      branch point (it was in a published release). Skip in files
      matching `CHANGES*`, `CHANGELOG*`, `MIGRATION*`, `UPGRADING*`,
      `*deprecation*` and inside `Deprecated:` / `Deprecation:`
      blocks — the legitimate homes for public-rename narration.

  - id: branch-internal.diff-paraphrase
    tier: B
    confidence: medium
    action: ask
    kind: semantic
    target: [diff]
    rationale: |
      Code comment, docstring, or README paragraph paraphrases the
      surrounding diff — "added handling for X", "refactored to use
      Y", "moved Z here", "removed the old wrapper". Reader gets no
      information they would not have by reading the code or the
      commit message.
    fp-guard: |
      Skip when the comment explains a hidden constraint or
      non-obvious invariant in the current code rather than
      describing the edit — test: would the comment make sense to a
      reader who had never seen the previous version? Skip in
      `CHANGES` / `CHANGELOG` files where describing the change is
      the purpose.
